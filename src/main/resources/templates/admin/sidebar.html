<div th:fragment="sidebar" id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <h5 class="sidebar-title m-0" th:text="${session.aktifKullanici != null ? session.aktifKullanici.ad + ' ' + session.aktifKullanici.soyad : 'Library Admin'}">Library Admin</h5>
        <button class="toggle-btn" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    </div>
    <ul class="nav flex-column mt-3">
        <li class="nav-item"><a th:href="@{/dashboard/admin}" class="nav-link"><i class="fa-solid fa-chart-pie"></i><span class="sidebar-text">Dashboard</span></a></li>
        <li class="nav-item"><a th:href="@{/admin/kitaplar}" class="nav-link"><i class="fa-solid fa-book"></i><span class="sidebar-text">Kitap Listeleri</span></a></li>
        <li class="nav-item"><a th:href="@{/admin/kullanicilar}" class="nav-link"><i class="fa-solid fa-users"></i><span class="sidebar-text">Kullanıcılar</span></a></li>
        <li class="nav-item"><a th:href="@{/odunc-islemleri}" class="nav-link"><i class="fa-solid fa-hand-holding-hand"></i><span class="sidebar-text">Ödünç İşlemleri</span></a></li>
        <li class="nav-item"><a th:href="@{/cezalar}" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i><span class="sidebar-text">Cezalar</span></a></li>
        <li class="nav-item"><a th:href="@{/admin/rezervasyonlar}" class="nav-link"><i class="fa-solid fa-calendar-check"></i><span class="sidebar-text">Rezervasyonlar</span></a></li>
        <li class="nav-item"><a th:href="@{/admin/sistem-ayarlari}" class="nav-link"><i class="fa-solid fa-gear"></i><span class="sidebar-text">Sistem Ayarları</span></a></li>
        <li class="nav-item mt-auto"> <a th:href="@{/logout}" class="nav-link text-danger"> <i class="fa-solid fa-right-from-bracket"></i> <span class="sidebar-text">Çıkış Yap</span> </a> </li>
    </ul>
    <style>
        /* Modern Floating & Glassmorphism Sidebar */
        .sidebar { 
            width: 260px; 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #1e293b; 
            height: calc(100vh - 40px); 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            border-radius: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            overflow-y: auto; 
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.1); 
        }
        
        /* Custom Scrollbar for Sidebar */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        .sidebar.collapsed { width: 80px; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 24px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 10px; }
        .sidebar.collapsed .sidebar-title { display: none; }
        
        .sidebar-title { font-weight: 700; color: #334155; }
        
        .sidebar .nav { list-style: none; padding: 0 10px; margin: 0; display: flex; flex-direction: column; }
        .sidebar .nav-item { margin-bottom: 8px; }
        
        .sidebar .nav-link { 
            color: #475569; 
            padding: 14px 20px; 
            border-radius: 20px;
            transition: all 0.3s; 
            white-space: nowrap; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 600; 
        }
        
        .sidebar .nav-link:hover { 
            color: #4f46e5; 
            background: rgba(255,255,255,0.7); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transform: translateY(-2px);
        }
        
        .sidebar .nav-link i { 
            min-width: 40px; 
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem; 
            margin-right: 12px; 
            background: rgba(255,255,255,0.5);
            border-radius: 14px;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        
        .sidebar .nav-link:hover i {
            background: #4f46e5;
            color: #fff;
            box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
        }
        
        .sidebar.collapsed .nav-link i { margin-right: 0; }
        .sidebar .sidebar-text { transition: opacity 0.3s; }
        .sidebar.collapsed .sidebar-text { opacity: 0; display: none; }
        
        .toggle-btn { background: #fff; color: #475569; border: 1px solid rgba(0,0,0,0.05); font-size: 1rem; cursor: pointer; width: 36px; height: 36px; border-radius: 12px; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; }
        .toggle-btn:hover { color: #4f46e5; transform: scale(1.05); }
        
        .content-area { margin-left: 300px; padding: 20px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); min-height: 100vh; }
        .content-area.collapsed { margin-left: 120px; }
        
        /* Logout Button Customization */
        .sidebar .nav-item.mt-auto { margin-top: auto !important; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); }
        .sidebar .nav-link.text-danger:hover { color: #ef4444; }
        .sidebar .nav-link.text-danger:hover i { background: #ef4444; color: #fff; box-shadow: 0 6px 12px rgba(239, 68, 68, 0.3); }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');
            const contentArea = document.querySelector('.content-area');
            const toggleBtn = document.getElementById('sidebarToggle');

            if(localStorage.getItem('sidebarCollapsed') === 'true') {
                sidebar.classList.add('collapsed');
                if(contentArea) contentArea.classList.add('collapsed');
            }

            toggleBtn.addEventListener('click', function() {
                sidebar.classList.toggle('collapsed');
                if(contentArea) contentArea.classList.toggle('collapsed');
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
            });
        });
    </script>
</div>

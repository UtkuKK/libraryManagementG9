<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - Library</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        .auth-card {
            width: 430px;
            background: #fff;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 8px 25px rgba(15, 23, 42, 0.08);
            padding: 34px;
        }

        .logo-box {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            background: #eff6ff;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin: 0 auto 18px;
        }

        .form-label {
            font-weight: 600;
            font-size: 13px;
            color: #475569;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 12px 14px;
            font-size: 14px;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .btn-main {
            background: #2563eb;
            color: #fff;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            border: none;
        }

        .btn-main:hover {
            background: #1d4ed8;
            color: #fff;
        }

        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 18px;
            font-size: 14px;
        }

        .auth-links a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 600;
        }

        .alert {
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="auth-card">

    <div class="logo-box">
        <i class="fa-solid fa-book"></i>
    </div>

    <h3 class="text-center fw-bold mb-1">Library Login</h3>

    <p class="text-center text-muted mb-4" style="font-size:14px">
        Hesabınıza giriş yapın
    </p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${param.registered}" class="alert alert-success">
        Kayıt başarılı. Şimdi giriş yapabilirsiniz.
    </div>

    <div th:if="${param.logout}" class="alert alert-info">
        Çıkış yaptınız.
    </div>

    <div th:if="${param.passwordChanged}" class="alert alert-success">
        Şifreniz başarıyla güncellendi. Yeni şifrenizle giriş yapabilirsiniz.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">E-posta Adresi</label>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="email@example.com"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Şifre</label>

            <input type="password"
                   name="sifre"
                   class="form-control"
                   placeholder="Şifrenizi girin"
                   required>
        </div>

        <button type="submit" class="btn btn-main w-100">
            <i class="fa-solid fa-right-to-bracket me-2"></i>
            Giriş Yap
        </button>
    </form>

    <div class="auth-links">
        <a th:href="@{/register}">
            Kayıt Ol
        </a>

        <a th:href="@{/sifremi-unuttum}">
            Şifremi Unuttum
        </a>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - Library</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        .auth-card {
            width: 470px;
            background: #fff;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 8px 25px rgba(15, 23, 42, 0.08);
            padding: 34px;
        }

        .logo-box {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            background: #eff6ff;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin: 0 auto 18px;
        }

        .form-label {
            font-weight: 600;
            font-size: 13px;
            color: #475569;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 12px 14px;
            font-size: 14px;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .btn-main {
            background: #2563eb;
            color: #fff;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            border: none;
        }

        .btn-main:hover {
            background: #1d4ed8;
            color: #fff;
        }

        .login-link {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .login-link a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 600;
        }

        .alert {
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="auth-card">

    <div class="logo-box">
        <i class="fa-solid fa-user-plus"></i>
    </div>

    <h3 class="text-center fw-bold mb-1">Kayıt Ol</h3>

    <p class="text-center text-muted mb-4" style="font-size:14px">
        Yeni hesap oluşturun
    </p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Ad</label>

                <input type="text"
                       name="ad"
                       class="form-control"
                       placeholder="Adınız"
                       required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Soyad</label>

                <input type="text"
                       name="soyad"
                       class="form-control"
                       placeholder="Soyadınız"
                       required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">E-posta Adresi</label>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="email@library.com"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Telefon</label>

            <input type="text"
                   name="telefon"
                   class="form-control"
                   maxlength="14"
                   pattern="05[0-9]{9}"
                   placeholder="0555 123 45 67"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Adres</label>

            <textarea name="adres"
                      class="form-control"
                      rows="2"
                      placeholder="Adres bilgisi"></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label">Şifre</label>

            <input type="password"
                   name="sifre"
                   class="form-control"
                   placeholder="Şifre oluşturun"
                   required>
        </div>

        <button type="submit" class="btn btn-main w-100">
            <i class="fa-solid fa-user-check me-2"></i>
            Hesap Oluştur
        </button>

    </form>

    <div class="login-link">
        Zaten hesabın var mı?

        <a th:href="@{/login}">
            Giriş Yap
        </a>
    </div>

</div>

<script>
    const telefonInput = document.getElementById('telefonInput');

    if (telefonInput) {

        telefonInput.addEventListener('input', function (e) {

            let value = e.target.value.replace(/\D/g, '');

            if (value.length > 11) {
                value = value.slice(0, 11);
            }

            let formatted = '';

            if (value.length > 0) {
                formatted += value.substring(0, 4);
            }

            if (value.length >= 5) {
                formatted += ' ' + value.substring(4, 7);
            }

            if (value.length >= 8) {
                formatted += ' ' + value.substring(7, 9);
            }

            if (value.length >= 10) {
                formatted += ' ' + value.substring(9, 11);
            }

            e.target.value = formatted;
        });

    }
</script>

</body>
</html>

<div th:fragment="sidebar" id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <h5 class="sidebar-title m-0"
            th:text="${session.aktifKullanici != null ? session.aktifKullanici.ad + ' ' + session.aktifKullanici.soyad : 'Library Staff'}">
            Library Staff
        </h5>

        <button class="toggle-btn" id="sidebarToggle" type="button">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <ul class="nav flex-column mt-3">
        <li class="nav-item">
            <a th:href="@{/dashboard/staff}" class="nav-link">
                <i class="fa-solid fa-chart-pie"></i>
                <span class="sidebar-text">Dashboard</span>
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/staff/kitaplar}" class="nav-link">
                <i class="fa-solid fa-book"></i>
                <span class="sidebar-text">Kitap Listeleri</span>
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/staff/kullanicilar}" class="nav-link">
                <i class="fa-solid fa-users"></i>
                <span class="sidebar-text">Kullanıcılar</span>
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/odunc-islemleri/staff}" class="nav-link">
                <i class="fa-solid fa-hand-holding-hand"></i>
                <span class="sidebar-text">Ödünç İşlemleri</span>
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/cezalar/staff}" class="nav-link">
                <i class="fa-solid fa-money-bill-wave"></i>
                <span class="sidebar-text">Cezalar</span>
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/staff/rezervasyonlar}" class="nav-link">
                <i class="fa-solid fa-calendar-check"></i>
                <span class="sidebar-text">Rezervasyonlar</span>
            </a>
        </li>

        <li class="nav-item logout-item">
            <a th:href="@{/logout}" class="nav-link logout-link">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="sidebar-text">Çıkış Yap</span>
            </a>
        </li>
    </ul>

    <style>
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #1e293b;
            height: calc(100vh - 40px);
            position: fixed;
            top: 20px;
            left: 20px;
            border-radius: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            overflow-y: auto;
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.1);
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .sidebar.collapsed .sidebar-title {
            display: none;
        }

        .sidebar-title {
            font-weight: 700;
            color: #334155;
            font-size: 15px;
            max-width: 170px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar .nav {
            list-style: none;
            padding: 0 10px;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 160px);
        }

        .sidebar .nav-item {
            margin-bottom: 8px;
        }

        .sidebar .nav-link {
            color: #475569;
            padding: 14px 20px;
            border-radius: 20px;
            transition: all 0.3s;
            white-space: nowrap;
            overflow: hidden;
            display: flex;
            align-items: center;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
        }

        .sidebar .nav-link:hover {
            color: #3b82f6;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transform: translateX(5px);
        }

        .sidebar .nav-link i {
            min-width: 32px;
            font-size: 1.25rem;
            text-align: center;
            margin-right: 12px;
            transition: 0.3s;
        }

        .sidebar.collapsed .nav-link i {
            margin-right: 0;
            font-size: 1.4rem;
        }

        .sidebar .sidebar-text {
            transition: opacity 0.3s;
        }

        .sidebar.collapsed .sidebar-text {
            opacity: 0;
            display: none;
        }

        .logout-item {
            margin-top: auto;
        }

        .logout-link {
            color: #dc2626 !important;
        }

        .logout-link:hover {
            color: #b91c1c !important;
            background: rgba(254, 226, 226, 0.8) !important;
        }

        .toggle-btn {
            background: rgba(255,255,255,0.5);
            color: #475569;
            border: 1px solid rgba(0,0,0,0.1);
            font-size: 1rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .toggle-btn:hover {
            background: #fff;
            color: #3b82f6;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .content-area {
            margin-left: 300px;
            padding-top: 20px;
            padding-right: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
        }

        .content-area.collapsed {
            margin-left: 120px;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const sidebar = document.getElementById('sidebar');
            const contentArea = document.querySelector('.content-area');
            const toggleBtn = document.getElementById('sidebarToggle');

            if (!sidebar || !toggleBtn) return;

            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                sidebar.classList.add('collapsed');

                if (contentArea) {
                    contentArea.classList.add('collapsed');
                }
            }

            toggleBtn.addEventListener('click', function () {
                sidebar.classList.toggle('collapsed');

                if (contentArea) {
                    contentArea.classList.toggle('collapsed');
                }

                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
            });
        });
    </script>
</div>
